<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <title>Rocket Intelligence Dashboard (Stable)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            direction: rtl;
            margin: 24px;
            background: #f6f7fb
        }

        h1 {
            text-align: center;
            margin-bottom: 10px
        }

        #controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap
        }

        #drop {
            border: 2px dashed #bbb;
            border-radius: 10px;
            padding: 16px 24px;
            background: #fff;
            color: #666
        }

        #drop.drag {
            border-color: #4a7cff;
            color: #4a7cff
        }

        input[type=file] {
            padding: 6px
        }

        input[type=text] {
            padding: 6px 8px;
            width: 200px
        }

        #stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 14px 0;
            flex-wrap: wrap
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 10px 16px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
            font-size: 16px
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto
        }

        @media(min-width:900px) {
            .grid {
                grid-template-columns: 1fr 1fr
            }
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .08)
        }

        canvas {
            max-height: 360px
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 6px;
            text-align: center
        }

        th {
            background: #fafafa
        }

        .small {
            font-size: 12px;
            color: #777
        }
    </style>
</head>

<body>

    <h1>דשבורד שיגורי רקטות</h1>

     <div id="controls">
      <!--  <input type="file" id="fileInput" multiple accept=".json">
        <div id="drop">גרור לכאן קבצי JSON</div> -->
        <input type="text" id="search" placeholder="חיפוש עיר">
    </div>

    <div id="stats">
        <div class="card">סה״כ שיגורים: <b id="statLaunches">0</b></div>
        <div class="card">מס׳ אירועים: <b id="statEvents">0</b></div>
        <div class="card">מס׳ ערים: <b id="statCities">0</b></div>
        <div class="card small">נספרים רק category = 1</div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>Top ערים</h3>
            <canvas id="chartCities"></canvas>
        </div>
        <div class="panel">
            <h3>שיגורים לפי יום</h3>
            <canvas id="chartDays"></canvas>
        </div>
        <div class="panel">
            <h3>שיגורים לפי שעה</h3>
            <canvas id="chartHours"></canvas>
        </div>
        <div class="panel">
            <h3>ערים</h3>
            <table id="cityTable">
                <thead>
                    <tr>
                        <th>עיר</th>
                        <th>שיגורים</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        /* ---------- State ---------- */
        const state = {
            alerts: [],
            cityCounts: {},
            dayCounts: {},
            hourCounts: {},
            launches: 0,
            events: 0,
            charts: {}
        };

        /* ---------- Utils ---------- */
        function safeParseJSON(text) {
            try { return JSON.parse(text); } catch (e) { return null; }
        }

        function normalizeToArray(json) {
            if (!json) return [];
            if (Array.isArray(json)) return json;
            if (Array.isArray(json.data)) return json.data;
            if (Array.isArray(json.alerts)) return json.alerts;
            return [json];
        }

        function getCity(a) {
            const c = (a.NAME_HE || a.data || "לא ידוע");
            return String(c).trim();
        }

        function getDay(a) {
            return a.date || (a.alertDate ? a.alertDate.substring(0, 10) : "לא ידוע");
        }

        function getHour(a) {
            if (a.time && a.time.length >= 2) return a.time.substring(0, 2);
            if (a.alertDate && a.alertDate.length >= 13) return a.alertDate.substring(11, 13);
            return "00";
        }

        function sortByDate(a, b) {
            const da = new Date(a.alertDate || (a.date + " " + a.time));
            const db = new Date(b.alertDate || (b.date + " " + b.time));
            return da - db;
        }

        function resetState() {
            state.alerts = [];
            state.cityCounts = {};
            state.dayCounts = {};
            state.hourCounts = {};
            state.launches = 0;
            state.events = 0;
        }

        /* ---------- Charts ---------- */
        function destroyChart(id) {
            if (state.charts[id]) {
                state.charts[id].destroy();
                state.charts[id] = null;
            }
        }

        function drawBarChart(canvasId, labels, values, label) {
            destroyChart(canvasId);
            const ctx = document.getElementById(canvasId);
            state.charts[canvasId] = new Chart(ctx, {
                type: "bar",
                data: { labels: labels, datasets: [{ label: label, data: values }] },
                options: { plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
            });
        }

        /* ---------- Processing ---------- */
        function processAlerts() {
            // reset counters
            state.cityCounts = {};
            state.dayCounts = {};
            state.hourCounts = {};
            state.launches = 0;
            state.events = 0;

            const arr = [...state.alerts].sort(sortByDate);

            let openEvent = false;

            for (const a of arr) {
                const cat = Number(a.category);

                if (cat === 14) openEvent = true;

                if (cat === 1) {
                    state.launches++;
                    const city = getCity(a);
                    const day = getDay(a);
                    const hour = getHour(a);

                    state.cityCounts[city] = (state.cityCounts[city] || 0) + 1;
                    state.dayCounts[day] = (state.dayCounts[day] || 0) + 1;
                    state.hourCounts[hour] = (state.hourCounts[hour] || 0) + 1;
                }

                if (cat === 13 && openEvent) {
                    state.events++;
                    openEvent = false;
                }
            }
        }

        /* ---------- Rendering ---------- */
        function render() {
            document.getElementById("statLaunches").textContent = state.launches;
            document.getElementById("statEvents").textContent = state.events;
            document.getElementById("statCities").textContent = Object.keys(state.cityCounts).length;

            // Top cities
            const sortedCities = Object.entries(state.cityCounts).sort((a, b) => b[1] - a[1]);
            const top20 = sortedCities.slice(0, 20);
            drawBarChart("chartCities", top20.map(x => x[0]), top20.map(x => x[1]), "שיגורים");

            // Days
            const days = Object.keys(state.dayCounts).sort((a, b) => new Date(a) - new Date(b));
            drawBarChart("chartDays", days, days.map(d => state.dayCounts[d]), "שיגורים");

            // Hours
            const hours = Object.keys(state.hourCounts).sort();
            drawBarChart("chartHours", hours, hours.map(h => state.hourCounts[h]), "שיגורים");

            // Table
            const tbody = document.querySelector("#cityTable tbody");
            tbody.innerHTML = "";
            for (const [city, count] of sortedCities) {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${city}</td><td>${count}</td>`;
                tbody.appendChild(tr);
            }
        }

        /* ---------- File loading ---------- */
        // function handleFiles(files) {
        //     const readers = [];
        //     for (const file of files) {
        //         readers.push(new Promise(resolve => {
        //             const r = new FileReader();
        //             r.onload = e => {
        //                 const json = safeParseJSON(e.target.result);
        //                 const arr = normalizeToArray(json);
        //                 resolve(arr);

        //             r.readAsText(file);

        //     Promise.all(readers).then(results => {

        //             for (const a of arr) state.alerts.push(a);
        //         }
        //         processAlerts();
        //         render();
        //     });
        // }

        /* ----------  Events ---------- */
        // document.getElementById("fileInput").addEventListener("change", e => {
        //     resetState();
        //     handleFiles(e.target.files);
        // });

        // const drop = document.getElementById("drop");

        // drop.addEventListener("dragover", e => {
        //     e.preventDefault();
        //     drop.classList.add("drag");
        // });

        // drop.addEventListener("dragleave", () => {
        //     drop.classList.remove("drag");
        // });

        // drop.addEventListener("drop", e => {
        //     e.preventDefault();
        //     drop.classList.remove("drag");
        //     resetState();
        //     handleFiles(e.dataTransfer.files);
        // });

        // document.getElementById("search").addEventListener("input", function () {
        //     const text = this.value;
        //     const rows = document.querySelectorAll("#cityTable tbody tr");
        //     rows.forEach(r => {
        //         const city = r.children[0].textContent;
        //         r.style.display = city.includes(text) ? "" : "none";
        //     });
        // });

        document.addEventListener("DOMContentLoaded", function () {

    fetch("./M_I.json?v=" + Date.now())
        .then(r => r.json())
        .then(data => {

            resetState();

            const arr = normalizeToArray(data);

            for (const a of arr) {
                state.alerts.push(a);
            }

            processAlerts();
            render();

        })
        .catch(err => {
            console.error("Failed loading JSON:", err);
        });

});
    </script>

</body>

</html>
