name: Update Alerts

# מתי להריץ
on:
  push:
    branches:
      - main       # החלף בשם הענף שלך אם שונה
  schedule:
    - cron: "*/30 * * * *"  # כל חצי שעה
  workflow_dispatch:        # אפשר להריץ ידנית

# Force Node.js 24 עבור פעולות JavaScript
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-alerts:
    runs-on: ubuntu-latest
    steps:
      # Checkout הקוד
      - uses: actions/checkout@v3

      # הורדת הנתונים דרך proxy כדי לעקוף CORS
      - name: Download alerts JSON
        run: |
          curl -s "https://api.allorigins.win/raw?url=https://www.oref.org.il/WarningMessages/alert/alerts.json" -o data/alerts.json

      # Commit ו-Push עם token מתאים
      - name: Commit and push updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/alerts.json
          git commit -m "Auto-update alerts.json" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main