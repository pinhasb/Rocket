name: Update Alerts

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

# זה החלק הקריטי לפתרון שגיאה 128
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # עדכון לגרסה v4 פותר את אזהרת ה-Node

      - name: Create data directory if not exists
        run: mkdir -p data

      - name: Download alerts JSON
        run: |
          curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          -H "Referer: https://www.oref.org.il/" \
          -H "X-Requested-With: XMLHttpRequest" \
          -s "https://www.oref.org.il/WarningMessages/alert/alerts.json" -o data/alerts.json


      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json
          # רק אם יש שינויים בקובץ, נבצע Commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update alerts.json"
            git push
          fi